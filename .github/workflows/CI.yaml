name: BIF Toy Store CI Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build-and-test:
    runs-on: windows-latest

    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet Dependencies
        run: dotnet restore src/BIF-Toy-Store.slnx

      - name: Build the Solution
        run: dotnet build src/BIF-Toy-Store.slnx --configuration Release --no-restore

      - name: Run xUnit Tests
        run: dotnet test src/BIF-Toy-Store.slnx --configuration Release --no-build --logger "trx;LogFileName=test_results.trx" --results-directory src/BIF.ToyStore.Tests/TestResults/

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: src/BIF.ToyStore.Tests/TestResults/test_results.trx

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: .NET Tests
          path: src/BIF.ToyStore.Tests/TestResults/test_results.trx
          reporter: dotnet-trx
