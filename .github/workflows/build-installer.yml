name: Build WinUI Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-installer:
    runs-on: windows-2025
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    env:
      DOTNET_VERSION: 10.0.x
      TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
      RUNTIME_IDENTIFIER: win-x64
      APP_PROJECT: src/BIF.ToyStore.WinUI/BIF.ToyStore.WinUI.csproj
      SOLUTION_FILE: src/BIF-Toy-Store.slnx
      PUBLISH_DIR: src/BIF.ToyStore.WinUI/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish
      OBFUSCATED_PUBLISH_DIR: artifacts/publish-obfuscated
      OBFUSCAR_TOOL_PATH: .tools/obfuscar
      OBFUSCAR_VERSION: 3.0.0-beta.11
      OBFUSCAR_OUTPUT_DIR: artifacts/obfuscation/output
      OBFUSCAR_CONFIG_PATH: artifacts/obfuscation/obfuscar.xml
      INNO_SCRIPT: installer.iss
      INNO_COMPILER: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: ${{ !env.ACT }}

      - name: Setup .NET SDK
        if: ${{ !env.ACT }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Verify local .NET SDK for act
        if: ${{ env.ACT }}
        run: |
          dotnet --info
          $sdkVersion = dotnet --version
          if (-not $sdkVersion.StartsWith('10.')) {
            throw "Local act run requires .NET 10 SDK, but found $sdkVersion"
          }
        shell: powershell

      - name: Install Inno Setup on GitHub runner
        if: ${{ !env.ACT }}
        run: |
          if (Test-Path $env:INNO_COMPILER) {
            Write-Host "Inno Setup already available at $env:INNO_COMPILER"
            exit 0
          }

          choco install innosetup --yes --no-progress
        shell: powershell

      - name: Validate Inno Setup compiler
        run: >
          .\scripts\Validate-InnoSetup.ps1
          -CompilerPath $env:INNO_COMPILER
          -ScriptPath $env:INNO_SCRIPT
        shell: powershell

      - name: Clean previous Release outputs
        run: |
          dotnet clean $env:APP_PROJECT `
            -c Release `
            -r $env:RUNTIME_IDENTIFIER `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true

          $pathsToReset = @(
            $env:PUBLISH_DIR,
            $env:OBFUSCATED_PUBLISH_DIR,
            $env:OBFUSCAR_OUTPUT_DIR
          )

          foreach ($path in $pathsToReset) {
            if (Test-Path $path) {
              Remove-Item -Path $path -Recurse -Force
            }
          }
        shell: powershell

      - name: Restore app for installer publish
        run: >
          dotnet restore $env:APP_PROJECT
          -r $env:RUNTIME_IDENTIFIER
          -p:PublishReadyToRun=true
          -p:WindowsPackageType=None
          -p:WindowsAppSDKSelfContained=true
        shell: powershell

      - name: Publish WinUI app
        run: >
          dotnet publish $env:APP_PROJECT
          -c Release
          -f $env:TARGET_FRAMEWORK
          -r $env:RUNTIME_IDENTIFIER
          --self-contained true
          -p:PublishReadyToRun=true
          -p:WindowsPackageType=None
          -p:WindowsAppSDKSelfContained=true
          --no-restore
        shell: powershell

      - name: Verify publish output
        run: |
          if (-not (Test-Path $env:PUBLISH_DIR)) {
            throw "Publish output folder not found: $env:PUBLISH_DIR"
          }

          $requiredAppTileAssets = @(
            'Assets/AppTiles/Square150x150Logo.png',
            'Assets/AppTiles/Square44x44Logo.png',
            'Assets/AppTiles/Wide310x150Logo.png',
            'Assets/AppTiles/SplashScreen.png',
            'Assets/AppTiles/StoreLogo.png'
          )

          foreach ($asset in $requiredAppTileAssets) {
            $assetPath = Join-Path $env:PUBLISH_DIR $asset
            if (-not (Test-Path $assetPath)) {
              throw "Required AppTiles asset missing from publish output: $assetPath"
            }
          }

          Get-ChildItem -Path $env:PUBLISH_DIR | Select-Object Name, Length
        shell: powershell

      - name: Install Obfuscar tool
        run: >
          dotnet tool install
          --tool-path $env:OBFUSCAR_TOOL_PATH
          Obfuscar.GlobalTool
          --version $env:OBFUSCAR_VERSION
        shell: powershell

      - name: Prepare obfuscated publish payload
        run: |
          if (Test-Path $env:OBFUSCATED_PUBLISH_DIR) {
            Remove-Item -Path $env:OBFUSCATED_PUBLISH_DIR -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $env:OBFUSCATED_PUBLISH_DIR | Out-Null
          Copy-Item -Path (Join-Path $env:PUBLISH_DIR '*') -Destination $env:OBFUSCATED_PUBLISH_DIR -Recurse -Force
        shell: powershell

      - name: Generate Obfuscar config
        run: >
          .\scripts\Generate-ObfuscarConfig.ps1
          -InputDir $env:OBFUSCATED_PUBLISH_DIR
          -OutputDir $env:OBFUSCAR_OUTPUT_DIR
          -ConfigPath $env:OBFUSCAR_CONFIG_PATH
        shell: powershell

      - name: Obfuscate managed assemblies
        run: |
          $obfuscarExe = Join-Path $env:OBFUSCAR_TOOL_PATH 'obfuscar.console.exe'
          if (-not (Test-Path $obfuscarExe)) {
            throw "Obfuscar executable not found: $obfuscarExe"
          }

          $obfuscarConfigPath = [System.IO.Path]::GetFullPath($env:OBFUSCAR_CONFIG_PATH)
          & $obfuscarExe $obfuscarConfigPath

          Get-ChildItem -Path $env:OBFUSCAR_OUTPUT_DIR | Select-Object Name, Length
        shell: powershell

      - name: Merge obfuscated assemblies into installer payload
        run: |
          Get-ChildItem -Path $env:OBFUSCAR_OUTPUT_DIR -File | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination (Join-Path $env:OBFUSCATED_PUBLISH_DIR $_.Name) -Force
          }

          Get-ChildItem -Path $env:OBFUSCATED_PUBLISH_DIR | Select-Object Name, Length
        shell: powershell

      - name: Bundle local demo environment when present
        run: |
          $workspaceRoot = if ($env:GITHUB_WORKSPACE) { $env:GITHUB_WORKSPACE } else { (Get-Location).Path }
          $payloadEnvPath = Join-Path $env:OBFUSCATED_PUBLISH_DIR '.env'
          $candidateEnvPaths = New-Object System.Collections.Generic.List[string]

          if (-not [string]::IsNullOrWhiteSpace($env:ACT_LOCAL_ENV_PATH)) {
            $candidateEnvPaths.Add([System.IO.Path]::GetFullPath($env:ACT_LOCAL_ENV_PATH))
          }

          $candidateEnvPaths.Add((Join-Path $workspaceRoot '.env'))

          $resolvedEnvPath = $candidateEnvPaths |
            Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
            Select-Object -Unique |
            Where-Object { Test-Path -LiteralPath $_ } |
            Select-Object -First 1

          if ($resolvedEnvPath) {
            Copy-Item -Path $resolvedEnvPath -Destination $payloadEnvPath -Force
            Write-Host "Bundled local .env from $resolvedEnvPath into installer payload."
            exit 0
          }

          if (-not [string]::IsNullOrWhiteSpace($env:CLOUDINARY_URL)) {
            Set-Content -Path $payloadEnvPath -Value "CLOUDINARY_URL=$($env:CLOUDINARY_URL)" -Encoding UTF8
            Write-Host "Bundled local .env from CLOUDINARY_URL environment variable."
            exit 0
          }

          Write-Host "No local .env source found. Checked:"
          $candidateEnvPaths | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Select-Object -Unique | ForEach-Object {
            Write-Host " - $_"
          }
          Write-Host "Current working directory: $((Get-Location).Path)"
          Write-Host "Skipping bundled demo configuration."
        shell: powershell

      - name: Build installer with Inno Setup
        run: |
          & $env:INNO_COMPILER /Qp $env:INNO_SCRIPT
        shell: powershell

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BIF-Toy-Store-setup
          path: InstallerOutput/*.exe
          if-no-files-found: error

      - name: Upload obfuscation mapping
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BIF-Toy-Store-obfuscation
          path: |
            artifacts/obfuscation/obfuscar.xml
            artifacts/obfuscation/output/*.xml
            artifacts/obfuscation/output/*.map
          if-no-files-found: warn
