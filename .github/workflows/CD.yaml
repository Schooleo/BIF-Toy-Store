name: BIF Toy Store CD Pipeline

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App Version (e.g., 1.0.5)"
        required: true

jobs:
  build-and-package:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet Dependencies
        run: dotnet restore src/BIF-Toy-Store.slnx

      - name: Setup Obfuscar
        run: dotnet tool install --global Obfuscar.GlobalTool

      - name: Build Solution
        run: dotnet build src/BIF-Toy-Store.slnx -c Release --no-restore

      - name: Publish WinUI App (Unpackaged)
        run: |
          dotnet publish src/BIF.ToyStore.WinUI/BIF.ToyStore.WinUI.csproj `
            -c Release `
            -r win-x64 `
            --no-restore `
            /p:WindowsPackageType=None `
            /p:AppxPackage=false `
            /p:SelfContained=true `
            -o "${{ github.workspace }}\TempBuild"

      - name: Run Obfuscar
        working-directory: ${{ github.workspace }}\TempBuild
        run: |
          obfuscar.console ..\src\obfuscar.xml InPath=.

      - name: Finalize Obfuscated Build
        shell: pwsh
        run: |
          # Move protected DLLs back to root and clean up
          Copy-Item "TempBuild\Obfuscated\*.dll" -Destination "TempBuild" -Force
          Remove-Item "TempBuild\Obfuscated" -Recurse

      - name: Create Release Zip
        shell: pwsh
        run: |
          Compress-Archive -Path "TempBuild\*" -DestinationPath "BIF-ToyStore-v${{ github.event.inputs.version }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: BIF-ToyStore-v${{ github.event.inputs.version }}.zip
          draft: false
          prerelease: false
