name: BIF Toy Store CD Pipeline

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App Version (e.g., 1.0.5)"
        required: true

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet Dependencies
        run: dotnet restore src/BIF-Toy-Store.slnx

      - name: Setup Obfuscar
        run: dotnet tool install --global Obfuscar.GlobalTool

      - name: Build Solution for Obfuscation
        run: dotnet build src/BIF-Toy-Store.slnx -c Release --no-restore

      - name: Publish WinUI App (Unpackaged)
        run: |
          dotnet publish src/BIF.ToyStore.WinUI/BIF.ToyStore.WinUI.csproj `
            -c Release `
            -r win-x64 `
            --no-restore `
            /p:WindowsPackageType=None `
            /p:AppxPackage=false `
            /p:SelfContained=true `
            /p:PublishSingleFile=false `
            -o "${{ github.workspace }}\TempBuild"

      - name: Run Obfuscar on Published Files
        run: obfuscar.console src/obfuscar.xml

      - name: Move Obfuscated Files to Final Output
        shell: pwsh
        run: |
          Move-Item -Path "TempBuild\Obfuscated\*.dll" -Destination "TempBuild" -Force
          Remove-Item -Path "TempBuild\Obfuscated" -Recurse

      - name: Upload Executable Package
        uses: actions/upload-artifact@v4
        with:
          name: BIF-ToyStore-v${{ github.event.inputs.version }}
          path: ${{ github.workspace }}\TempBuild
